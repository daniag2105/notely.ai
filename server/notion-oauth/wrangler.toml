name = "notely-notion-oauth"
main = "src/index.js"
compatibility_date = "2024-11-01"

# No plaintext config here. Set these two as secrets after your first deploy:
#   npx wrangler secret put NOTION_CLIENT_ID
#   npx wrangler secret put NOTION_CLIENT_SECRET
# (NOTION_CLIENT_ID isn't strictly secret, but storing both the same way keeps it simple.)
