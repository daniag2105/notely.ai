appId: com.sahil.notely
productName: Notely.ai
copyright: Copyright © 2026 Dania Garman
# Ad-hoc signs the packaged app so it launches on Apple Silicon (electron-builder skips signing when
# identity is null, which leaves a broken signature macOS kills on launch). See build/afterPack.js.
afterPack: build/afterPack.js
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
win:
  executableName: notely
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  target: dmg
  category: public.app-category.education
  identity: null
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSDocumentsFolderUsageDescription: Notely.ai reads lecture slide files you choose from Documents.
    - NSDownloadsFolderUsageDescription: Notely.ai saves generated .md notes to Downloads.
  notarize: false
# NOTE: the electronFuses block was removed. Flipping fuses rewrites the Electron binary after it's
# signed, which invalidates the (ad-hoc, unsigned) signature and makes macOS SIGKILL the app on
# launch with "Code Signature Invalid" (crashes in electron::fuses::IsRunAsNodeEnabled). It can be
# re-added later once the app is properly signed with an Apple Developer ID + notarized.
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
